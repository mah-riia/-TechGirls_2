<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <title>TechGirls Login</title>
</head>

<body>
    <main class="container"> 
        <form action="../Tela_Principal/index.html" method="GET">
            <h1>TechGirls Login</h1>

            <div class="input-box">
                <input id="email" name="email" placeholder="Usuário" type="email" required>
                <i class="bx bxs-user"></i> 
            </div>

            <div class="input-box">
                <input id="senha" name="senha" placeholder="Senha" type="password" required>
                <i class="bx bxs-lock-alt"></i> 
            </div>

            <div class="lembrar-senha">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="login">Login</button>

            <div class="registrar-link">
                 <a href="../Tela_Cadastro/Cadastro.html">Criar nova conta</a>
            </div>
        </form>
    </main>
</body>

</html>
